<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ShopGo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--p:#FF6A00;--pd:#e05a00;--s:#FFA940;--bg:#F5F5F5;--card:#fff;--t:#222;--t2:#777;--red:#FF3B30;--bdr:#EAEAEA;--ok:#22C55E}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Poppins',sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
#app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column}
@media(min-width:450px){#app{box-shadow:0 0 60px rgba(0,0,0,.6)}}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ── TOP NAV ── */
#top-nav{background:var(--p);display:flex;align-items:center;padding:0 4px;flex-shrink:0;position:relative;z-index:60}
.tnav-logo{color:#fff;font-weight:700;font-size:1rem;padding:0 10px;white-space:nowrap}
.tnav-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.tnav-tabs::-webkit-scrollbar{display:none}
.tnav-tab{color:rgba(255,255,255,.75);font-size:.78rem;font-weight:500;padding:13px 14px;white-space:nowrap;cursor:pointer;border:none;background:none;font-family:'Poppins',sans-serif;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent;transition:color .15s}
.tnav-tab.active{color:#fff;border-bottom-color:#fff;font-weight:600}
.tnav-right{display:flex;align-items:center;gap:2px;padding-right:4px}
.tnav-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.85);border:none;background:none;-webkit-tap-highlight-color:transparent;position:relative}
.tnav-icon .badge{border-color:var(--p)}

/* ── BOTTOM NAV ── */
#bot-nav{background:#fff;display:flex;border-top:1px solid var(--bdr);flex-shrink:0;z-index:60}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent;position:relative;gap:3px}
.bnav-item svg{transition:stroke .15s}
.bnav-item span{font-size:.6rem;font-weight:500;color:var(--t2);transition:color .15s;line-height:1}
.bnav-item.active svg{stroke:var(--p)}
.bnav-item.active span{color:var(--p);font-weight:600}
.bnav-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:.55rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid #fff}

/* ── MAIN CONTENT AREA ── */
#main-content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.tab-panel.active{display:flex}

/* ── SHARED HEADER ── */
.hdr{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;border-bottom:1px solid var(--bdr);min-height:52px;flex-shrink:0}
.htitle{font-size:.98rem;font-weight:600;color:var(--t);flex:1;text-align:center}
.ibtn{width:40px;height:40px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;position:relative;-webkit-tap-highlight-color:transparent}
.ibtn:active{background:var(--bg)}
.badge{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;font-size:.58rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #fff}

/* ── BUTTONS ── */
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Poppins',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--p);color:#fff}
.bo{background:#fff;color:var(--p);border:1.5px solid var(--p)}
.bs{background:#fff;color:var(--t);border:1px solid var(--bdr)}
.bg{background:none;border:none;color:var(--t2);font-size:.88rem;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:underline;padding:10px}
.bbar{background:#fff;padding:12px 16px;display:flex;gap:10px;border-top:1px solid var(--bdr);flex-shrink:0;position:sticky;bottom:0;z-index:40}

/* ── LOGIN ── */
#screen-login{background:#fff;position:absolute;inset:0;z-index:100;display:none;flex-direction:column;overflow-y:auto}
#screen-login.active{display:flex}
.lhero{background:linear-gradient(150deg,var(--p),var(--s));padding:48px 24px 40px;text-align:center;color:#fff;flex-shrink:0}
.llogo{font-size:2rem;font-weight:700;margin-bottom:6px}
.ltag{font-size:.88rem;opacity:.88;line-height:1.6}
.lbody{padding:28px 20px 32px;flex-shrink:0}
.lwelcome{font-size:.9rem;color:var(--t2);text-align:center;margin-bottom:18px}
.lbtns{display:flex;flex-direction:column;gap:11px}

/* ── HOME TAB ── */
.sw{background:#fff;padding:10px 16px 12px;flex-shrink:0}
.sbar{background:var(--bg);border:1.5px solid var(--bdr);border-radius:24px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.sbar:focus-within{border-color:var(--p);background:#fff}
.sinput{border:none;background:none;outline:none;flex:1;font-family:'Poppins',sans-serif;font-size:.88rem;color:var(--t)}
.sinput::placeholder{color:#bbb}
.banner{margin:12px 16px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:16px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;flex-shrink:0}
.bsub{font-size:.7rem;opacity:.85;text-transform:uppercase;letter-spacing:.06em}
.btitle{font-size:1.1rem;font-weight:700;line-height:1.3;margin-top:3px}
.bbtn{margin-top:10px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);color:#fff;padding:6px 14px;border-radius:20px;font-size:.76rem;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif}
.bemoji{font-size:2.8rem;margin-left:10px;flex-shrink:0}
.sh{padding:10px 16px 4px;flex-shrink:0}
.st{font-size:.88rem;font-weight:600;color:var(--t)}
.ctw{padding:4px 16px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.ctw::-webkit-scrollbar{display:none}
.cts{display:flex;gap:8px;width:max-content}
.ct{padding:6px 15px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.ct.active{background:var(--p);color:#fff;border-color:var(--p)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.pcard{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.pcard:active{opacity:.9}
.pimg{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg)}
.pimg img{width:100%;height:100%;object-fit:cover;display:block}
.pbody{padding:10px 10px 12px;display:flex;flex-direction:column;flex:1}
.ptitle{font-size:.82rem;font-weight:500;color:var(--t);line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.pstats{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--t2);margin-bottom:6px}
.pstar{color:#F59E0B;font-weight:600}
.ppr{display:flex;align-items:baseline;gap:5px}
.pp{font-size:.95rem;font-weight:700;color:var(--p)}
.pop{font-size:.72rem;color:var(--t2);text-decoration:line-through}
.lw{display:flex;justify-content:center;padding:32px}
.loader{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
